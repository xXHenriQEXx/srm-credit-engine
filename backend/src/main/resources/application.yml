server:
  port: 8080

spring:
  application:
    name: srm-credit-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:srm_credit_engine}
    username: ${DB_USER:srm_user}
    password: ${DB_PASSWORD:srm_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

pricing:
  # Taxa base mensal (ex: proxy de CDI/SELIC) usada no motor de precificacao.
  base-monthly-rate: 0.01

security:
  jwt:
    # Chave de assinatura HMAC-SHA. Em producao, SEMPRE sobrescreva via
    # variavel de ambiente JWT_SECRET com um valor forte e mantido em
    # segredo (nunca commitado). Este valor default serve apenas para
    # rodar o projeto localmente/nesta entrega.
    secret: ${JWT_SECRET:srm-credit-engine-dev-secret-key-troque-em-producao-0123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.srmasset.creditengine: DEBUG
    org.hibernate.SQL: DEBUG
