version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: srm-credit-engine-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - srm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: srm-credit-engine-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:                ${DB_HOST}
      DB_PORT:                ${DB_PORT}
      DB_NAME:                ${DB_NAME}
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: srm-credit-engine-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  srm_db_data:
